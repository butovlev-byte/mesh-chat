name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    # Ubuntu 22.04 — стабильная версия, где autoconf/libffi совместимы
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             python3-pip build-essential git ffmpeg             libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev             libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev             libfreetype6-dev libgl1-mesa-dev libgles2-mesa-dev             libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev             libjpeg-dev libpng-dev libtiff-dev libwebp-dev             libffi-dev libssl-dev libsqlite3-dev zlib1g-dev             unzip automake autoconf libtool pkg-config cmake             default-jdk ant ccache autoconf-archive
          pip install --upgrade pip
          pip install buildozer cython

      - name: Fix sdkmanager
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          cd ~/.buildozer/android/platform/android-sdk/cmdline-tools

          if [ ! -f "latest/bin/sdkmanager" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q commandlinetools-linux-11076708_latest.zip
            mv cmdline-tools latest
            rm commandlinetools-linux-11076708_latest.zip
          fi

          # Симлинк для buildozer
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          ln -sf ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager                  ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

          # Принимаем лицензии
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

          echo "SDK готов"
          ls -la ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE
          buildozer android debug
        env:
          ANDROIDSDK: /home/runner/.buildozer/android/platform/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meshchat-apk
          path: bin/*.apk
          if-no-files-found: error
