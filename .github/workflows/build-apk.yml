name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential git zip unzip openjdk-17-jdk
        pip install buildozer cython
    
    - name: Accept Android SDK licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        # Создаём папку для Android SDK, если Buildozer ещё не создал
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        # Принимаем лицензии через sdkmanager после первичной установки SDK
        yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
    
    - name: Build APK
      run: |
        cd src
        buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: meshchat-apk
        path: src/bin/*.apk
        retention-days: 30

