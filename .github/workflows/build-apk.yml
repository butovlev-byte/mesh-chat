name: Build Android APK (p4a)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Android SDK
        run: |
          # Устанавливаем Android SDK вручную
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools

          # Скачиваем cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          rm commandlinetools-linux-11076708_latest.zip

          # Добавляем в PATH
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"

          # Устанавливаем platform-tools, platforms, build-tools
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0" "ndk;25.1.8937393"

          # Сохраняем переменные
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROIDSDK=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROIDNDK=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             python3-pip build-essential git ffmpeg             libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev             libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev             libfreetype6-dev libgl1-mesa-dev libgles2-mesa-dev             libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev             libjpeg-dev libpng-dev libtiff-dev libwebp-dev             libffi-dev libssl-dev libsqlite3-dev zlib1g-dev             unzip automake autoconf libtool pkg-config cmake             default-jdk ant ccache
          pip install --upgrade pip
          pip install python-for-android cython

      - name: Build APK with p4a
        run: |
          cd $GITHUB_WORKSPACE

          # Создаём spec-файл для p4a
          p4a apk             --private src             --package org.meshchat.meshchat             --name "MeshChat"             --version 1.0.0             --bootstrap sdl2             --requirements python3,kivy==2.3.0,kivymd==1.2.0,pyjnius,bleak,cryptography,pycryptodome             --arch arm64-v8a             --arch armeabi-v7a             --permission INTERNET             --permission BLUETOOTH             --permission BLUETOOTH_ADMIN             --permission BLUETOOTH_SCAN             --permission BLUETOOTH_CONNECT             --permission BLUETOOTH_ADVERTISE             --permission ACCESS_FINE_LOCATION             --permission ACCESS_COARSE_LOCATION             --permission READ_CONTACTS             --permission READ_PHONE_STATE             --permission FOREGROUND_SERVICE             --permission WAKE_LOCK             --permission POST_NOTIFICATIONS             --permission RECEIVE_BOOT_COMPLETED             --orientation portrait             --icon src/assets/icon.png             --presplash src/assets/presplash.png             --release
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROIDSDK: ${{ env.ANDROID_HOME }}
          ANDROIDNDK: ${{ env.ANDROID_HOME }}/ndk/25.1.8937393

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meshchat-apk
          path: '*.apk'
          if-no-files-found: error

